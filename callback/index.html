<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Autorisation TikTok</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; text-align: center;">
<h1>Autorisation reçue</h1>
<p>Copie le code ci-dessous et colle-le dans Claude Code :</p>
<div id="code" style="font-size: 20px; background: #f0f0f0; padding: 20px; word-break: break-all; border-radius: 8px;"></div>
<script>
  const params = new URLSearchParams(window.location.search);
  document.getElementById('code').textContent = params.get('code') || 'Aucun code trouvé dans l\'URL';
</script>
</body>
</html>
